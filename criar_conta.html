<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Criar Conta — Projecto My Shool</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<script type="module" src="db_accounts.js"></script>

<style>
:root{--ease:cubic-bezier(.25,.46,.45,.94);--spring:cubic-bezier(.175,.885,.32,1.275);}
[data-theme="dark"]{--bg:#070710;--surface:rgba(20,20,32,.95);--surface2:rgba(30,30,46,.7);--glass:rgba(255,255,255,.05);--gb:rgba(255,255,255,.10);--text:#eeeef4;--text2:#8888a8;--text3:#4a4a6a;--accent:#4F8EF7;--accent2:#7B61FF;--green:#22c55e;--red:#ef4444;--sep:rgba(255,255,255,.08);--blur:blur(24px) saturate(160%);--shadow:0 20px 60px rgba(0,0,0,.55);}
[data-theme="light"]{--bg:#f0f0f8;--surface:rgba(255,255,255,.9);--surface2:rgba(240,240,248,.8);--glass:rgba(255,255,255,.7);--gb:rgba(0,0,0,.08);--text:#16161e;--text2:#5a5a7a;--text3:#aaaacc;--accent:#2563eb;--accent2:#5856d6;--green:#16a34a;--red:#dc2626;--sep:rgba(60,60,80,.09);--blur:blur(24px) saturate(160%);--shadow:0 8px 30px rgba(0,0,0,.10);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;font-size:15px;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(79,142,247,.10) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 90% 90%,rgba(123,97,255,.07) 0%,transparent 50%);}

.container{width:100%;max-width:420px;position:relative;z-index:1;}
.card{background:var(--surface);backdrop-filter:var(--blur);border:0.5px solid var(--gb);border-radius:24px;padding:28px 22px;box-shadow:var(--shadow);overflow:hidden;}
.card-header{text-align:center;margin-bottom:24px;}
.header-logo{width:60px;height:60px;border-radius:16px;margin:0 auto 14px;background:linear-gradient(135deg,rgba(79,142,247,.2),rgba(123,97,255,.12));border:0.5px solid rgba(79,142,247,.3);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 30px rgba(79,142,247,.2);}
.card-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;background:var(--surface2);border:0.5px solid var(--sep);border-radius:12px;color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12);}
.field input::placeholder{color:var(--text3);}
.btn-next{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(79,142,247,.28);margin-top:4px;}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,142,247,.4);}
.btn-next:active{transform:scale(.97);}
</style>
</head>
<body>
<div class="container">
  <div class="card" id="main-card">

    <div class="card-header">
      <div class="header-logo">🛡️</div>
      <h1 class="card-title">Criar Conta Admin</h1>
      <p class="card-sub">Projecto My Shool</p>
    </div>

    <form id="form-cadastro">
      <div class="field">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Teu nome" required>
      </div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="exemplo@gmail.com" required>
      </div>

      <div class="field">
        <label>Palavra-passe</label>
        <input type="password" id="senha" placeholder="Escolha uma senha" required>
      </div>

      <button type="submit" class="btn-next">Criar Minha Conta →</button>
    </form>

  </div>
</div>
</body>
</html>
